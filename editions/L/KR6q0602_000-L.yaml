front:
  text: 雪嶠禪師語錄序魚一曹溪受法弟子福徵譚貞默謹撰大師自乙亥春為黃海岸余集生諸居士驛駱奔趨雙徑強之開堂登祖位說法王法出世大事因緣實始此前此從雲門石頭上得正句後誅茅高峰雙髻者六載從荊溪龍池叅幻和尚受具戒更名記莂後曳杖徑山千指者二十餘載活埋歲月嘯傲煙雲若非鐘樓生耳佛殿懷胎那肯容易許人出世既從徑山而金陵靜明而廬山開先而長明能仁而濟生院祗陀林而越州顯聖四明景德而荊溪南嶽而光溪天王而檇李東塔而雲間勝果頤浩而究竟末後一着於雲門悟道石之地時在丁亥遡前乙亥僅越一紀而坐東南大道塲者十有餘會結冬者四期其間龍池埽塔天童封塔許大奇特機緣在語風老人分中只當一頓家常茶飯耳若夫正令高提孤情絕照宗風流暢響振諸方曲終撒手獅絃尤勁何待語錄馳布而後塗毒發聾哉積年絡索遘此劫灰正好散歸龍藏乃有獅聲珠公復為之摭拾編次俾得遡流知源披枝見本而吾友葵石居士昆季還念疇昔皈依道誼因捐資壽剞劂與天龍神鬼及海內有眼無眼入共矜式之將無被老人常寂光中捉鼻大笑乎何笑笑眼前伶俐禪和畧得出頭吐氣便教白帋黑字充棟汗牛其為水母眼鸚鵡舌者多多許矣的的消隕虛空超越佛祖為眼裏筋舌中骨者幾人即不乏真實叅悟歷代師承如玄圃積玉鮫人泣珠其為珠玉則同而趙璧之連城隋珠之照乘若老人之殺活縱奪賔主全融擺壞鎻韁不求伴侶者幾人倘遇波斯胡定知毫釐千里也不慧隨侍盤桓歲歷四紀不曾向佛法中作一合頭語今日何能饒舌贊嘆一辭獨念老人能掃三千大千世界衣拂影子那能斷威音王以前水乳消息不牽自肯只今當問之徹崖獅聲兩公與葵石居士因繫以頌頌曰雪老鼻孔撩天公案出語為風着手便判世界小兒是非莫管祖令孤行青獅活現厥謚云何宗壇鐵漢眾護法請開堂疏伏諗宗門一路久矣線道不通日午打三更留黑白未分之消息連夜日頭出少常住不動之師承擬掃塵妖當宏利濟恭惟雪嶠大和尚猊座宗無所宗法本無法空中伸巨臂掐斷從上諸佛祖鼻梁身畔現韋䭾打屏五百比丘踪影古雲門三字見凡聖於一家爛豆渣半升闢艸萊乎雙髻呵斥諸方從無當意輕許可撈漉群趣不將佛法當人情語風提唱照地光天廬山開先懸崖峻壁七十五燈俱是火掌握薪傳百千三昧悉真空口吐血脉欽震旦之將登獨坐適福城之現主人伏祈大和尚小遊戲而飛錫肯來大踏步而折葦即至魔也打佛也打堂堂見性明心明頭來暗頭來的的攔胸劈面獅王出窟俾萬獸之潛形金翅分波使諸龍之斷命一切眾生胥擁戴十方賢聖悉依皈谷等臨啟曷勝企佇顒誠之至崇禎十六年夏月禾城曹谷譚貞默朱茂時汪挺高承埏朱茂睭王起隆兩邑護法仝疏雪嶠禪師語錄目錄卷首序文開堂疏第一卷住嘉禾東塔禪寺語錄第二卷住廬山開先禪寺語錄住越州雲門禪寺語錄普說第三卷小叅晚叅茶話示眾開示第四卷法語叅請機緣問答機緣第五卷佛祖偈贊自贊附贊頌垂問畣頌偈佛事第六卷拈頌第七卷拈頌懷淨土詩第八卷書問歌雜著第九卷道行碑上第十卷道行碑下雪嶠禪師語錄目錄終
