body:
  text: 叅學門人弘珠等編拈頌世尊纔生下乃一手指天一手指地周行七步目顧四方曰天上天下惟吾獨尊拈世尊奇特忒煞奇特未免傍觀者哂頌七步周行也不妨指天指地便郎當大風吹倒梧桐𣗳自有傍人說短長未離兜率已降王宮未出母胎度人已畢拈這個語話向青盲人說始得若遇明眼人亂鎚一頓莫言不道頌一園春色播江湖香入丹青絕妙圖非但瞿曇能賣弄張三李四赤鬍鬚等閑註破黃金面大好男兒不丈夫總使不移蛙足跡那知早已落程途鵲嘻嘻兮鳥啼啼這個風流在院西扶出樓臺公子貴活埋踪跡牯牛蹄花明閨閣春多怨月落無勞報曉鷄莓爛石頭香醉眼何須土上更加泥世尊拈花拈世尊說法四十九年不知賺殺多少人到這裏猶是放不下咄莫作是說𣗳高千丈葉落歸根三乘十二分教乃拈華之註世尊還記得麼頌末後拈來花一枝露濃香冷報君知人天百萬同長短何故偏消迦葉疑可惜許春風遙送殘更雨文殊白椎拈雙髻當時若在奪却文殊椎子喝一喝看那黃面老人作何去就頌張郎沈醉一盃酒扶醉李郎醉更深不顧根三尺水只貪縱步上高岑阿難問迦葉曰師兄世尊傳金襴袈裟外別傳個甚麼迦葉召阿難阿難應諾迦葉曰倒却門前剎竿著拈阿難善問迦葉善答迦葉答處阿難未必會阿難問處迦葉赴機雖然如是要且剎竿至今扶不起嗟別傳之旨迦葉其人歟血脈久長從這裏流出頌隣含無油不點燈清談待月眼惺惺剎竿倒却渾多事為指阿難過草亭迦葉老仔細聽魚行水濁荻蘆青曹溪路上秋風急驚起雁行飛不停岟崛摩羅因持鉢至長者門其家婦人正值產難子母未分長者曰瞿曇弟子汝為至聖何法可免產難羅曰我乍入道未知此法待問世尊來相報及返白佛佛曰我自賢聖法來未嘗殺生岟崛疾持佛語徃告之其婦當時分娩拈岟崛傳言送語好與三十拄杖其婦當時分娩且許一半何故貪觀天上月失却手中橈頌墻角花容欲綻眉曉霜清冷蘊香池橫開不在春枝上別有家風一𫨻奇世尊因靈山會上五百比丘得四禪定具五神通未得法忍以宿命智通各各自見過去殺父害母及諸重罪於自心內各各懷疑於甚深法不能證入於是文殊承佛神力遂手握利劒持逼如來世尊乃謂文殊曰住住不應作逆勿得害吾吾必被害為善被害文殊師利爾從本已來無有我人但以內心見有我人內心起時我必被害即名為害於是五百比丘自悟本心如夢如幻於夢幻中無有我人乃至能生所生父母於是五百比丘同讚歎曰文殊大智士深達法源底自手握利劒持逼如來身如劒佛亦爾一相無有二無相無所生是中云何殺拈文殊殺佛則且從若無黃面老人打許多葛藤五百比丘疑至今日尚未住手頌莫笑他家忤逆兒戲房鑼鼓振天嘶住住住透牛皮雨爛春風花滿池內心不起如何也瓦解氷消萬劫疑乾闥婆王獻樂拈乾闥婆王被世尊東扯西拽說得却好王雖懡㦬而退且信一半頌風不來𣗳不動田鷄不跳草不動乾闥婆王眼失睛埋冤迦葉偷糟甕女子出定拈也奇怪文殊乃七佛之師因甚出女人定不得且道利害在甚麼所在頌子丑寅卯辰巳午甲乙丙丁莫莾鹵瞥然撞著李將軍石頭何用千鈞弩龍𣗳尊者西天竺國人也亦名龍勝始於摩羅尊者得法後至南印土彼國之人多信福業祖為說法遞相謂曰人有福業世間第一徒言佛性誰能覩之祖曰汝欲見佛性先須除我慢彼人曰佛性大小祖曰非大非小非廣非狹無福無報不死不生彼聞理勝悉回初心祖復於座上現自在身如滿月輪一切眾惟聞法音不覩祖相彼眾中有長者子名迦那提婆謂眾曰識此相否眾曰目所未覩安能辨識提婆曰此是尊者現佛性體相以示我等何以知之盖以無相三昧形如滿月佛性之義廓然虛明言訖輪相即隱拈余觀此一𫨻甚為奇特而今目前眾生稱悟道頗多不識曾見佛性體相如滿月輪否若不自己親見一番自稱見性悟道者俱為戲論頌吾心清淨同滿月一切影現於其中若有若無不可取非現非比非聲色不屬陰陽造化功而能造化諸品物祖佛豈能測其際眾生朝夕輪回光輪廻光中如夢事一一成現三摩地若離一切眾生界畢竟心相不可得心相猶於業力邊亦有亦無而顯現若人欲知自心體滌身垢穢同秋水水清自然現其月洞達孤照不思議孤照之功非在水水空滄溟豈無月因水清淨而應之要知五蘊根本處一鎚錐碎娘生鼻四大原無似空幻覺之通身蓮花莖晝夜香風吹入眉眉間毛孔皆諸佛佛是何人我亦誰我無我故同諸佛君欲起念黑雲生埃塵面面飛蓬孛仙人外道及邪魔總入珠體非外物魔王持刀欲斬水水不成痕月不動春秋夏月及冬季時時不出心空界地獄天堂翻覆為或為牛馬或猪狗或作人天或作祖俱在心相中來徃六根晝夜光湛然淨潔無為若滿月囑付癡愚莫動著動著好與三十棒障蔽魔王領諸眷屬一千年隨從金剛齊覓起處不得忽一日得見乃問云汝當依何住我一千年覓汝起處不得菩薩云我不依有住而住不依無住而住如是而住拈金剛齊菩薩太煞逗漏既如是而住怎麼又被魔王覷破妙喜老人云一千年隨從底又是甚麼囫圇吞個棗若依徑山斷總之不然既不見金剛齊隨從一千年作麼既有可隨從者忽有可見者豈非二金剛齊也且要問伊二人那裏過日頌妙喜老人下一語大似囫圇吞個棗塞北春寒凍馬蹄江南地暖先青草有住無住且放過朝夕隨從底事好金剛齊還知道楊花粘地一些些袖裏風光都靠倒臺山㜑子拈臺山路上少這婆子不得自從趙州勘破後直至於今草漫漫地東倒西擂頌臺山婆臺山婆死去十分沒奈何開眼受人穿鼻孔惡人自有惡人魔大隨和尚庵側有一龜僧問一切眾生皮裹骨這個眾生為甚骨裹皮師拈草履覆龜背上僧無語拈還知麼大隨和尚拈草鞋盖覆烏龜不是好心這僧無語口似磉盤頌皮裹骨骨裹皮草鞋拈得覆烏龜風吹日𬉹渾無事不怕人來問著渠溈山問香嚴我聞汝在百丈先師處問一答十問十答百此是汝聰明靈利意解識想生死根本父母未生時試道一句看師被一問直得茫然歸寮將平日看過底文字從頭要尋一句酬對竟不能得乃自歎曰畫餅不可充饑屢乞溈山說破山曰我若說似汝汝已後罵我去我說底是我底終不干汝事師遂將平昔所看文字燒却曰此生不學佛法也且作個長行粥飯僧免役心神乃泣辭溈山直過南陽覩忠國師遺蹟遂憩止焉一日芟除草木偶拋瓦礫擊竹作聲忽然省悟遽歸沐浴焚香遙禮溈山讚曰和尚大慈恩逾父母當時若為我說破何有今日之事乃有頌曰一擊忘所知墮落深坑裏更不假修持秤鎚鐵打的動容揚古路切莫錯認著不墮悄然機猶是第二義處處無踪跡只道得一半聲色外威儀無人識得渠諸方達道者冬瓜茄子不生耳躲咸言上上機少賣弄溈山聞得謂仰山曰此子徹也仰山不肯師又呈頌曰去年貧未是貧今年貧始是貧去年貧猶有卓錐之地今年貧錐也無仰曰如來禪許師弟會祖師禪未夢見在師復有頌曰我有一機瞬目視伊若人不會別喚沙彌仰乃報溈山曰且喜閑師弟會祖師禪也拈仰山逼師弟落水香嚴一命償一命若不著無底靴怎解入龍宮頌無事長林掃地來蒼烟擊竹頂門開溈山今日分明道五月霜花照石苔臨濟三頓棒拈三度問話三度被打總之毒根深種不知痛癢若無大愚點破何處見有臨濟兒孫橫行天下頌尊宿當年心太孤生機斷送入紅爐尿牀鬼子如何道肋下還拳有大愚僧問雪峰古澗寒泉時如何峰曰睜目不見底曰飲者如何峰曰不從口入其僧舉似趙州州曰不從口入不可從鼻孔裏入僧卻問古澗寒泉時如何州曰苦曰飲者如何州曰死後雪峰聞得自此三年不答話拈雪峰老老大大未免隨人起倒趙州若無這僧何處得見雪峰雙髻今日將二老縛作一束拋在春風堆裏任他花開花落還有人與二老雪屈者麼頌五里一箇亭十里一箇舖方便有多岐出門不認貨雪峰老何處討烟波江上釣魚舟夾岸荻花秋正好殘更不必著精神伸莫愁天地杳百丈再叅拈父子互換縱奪可觀冷眼看來總是白地上弄精魂復拈馬祖一喝坐斷諸佛頂𩕳何人敢向此說是大機大用尚未識馬祖這一喝在百丈自得三日耳聾猶是指踪迷跡之象豈但三日耳聾為然哉頌三日耳聾也大奇業風揭塞髑髏泥而今鼓弄唇皮者能得幾人像阿師何以故此處無銀三十兩咄頌馬祖一喝重須彌不落空山萬級梯未有祖師先有喝却聾百丈不聾妻宗風高起飛龍象狐隊沉淪弄鼓鼙何似青天揮霹靂藥山一笑與君齊洛浦到夾山不禮拜乃當面叉手而立山曰鷄棲鳳巢非其同類出去師曰自遠趨風請師一接山曰目前無闍𥠖此間無老僧師便喝山曰住住且莫草草囱囱雲月是同溪山各異截斷天下人舌頭即不無闍𥠖爭教無舌人解語師佇思山便打因茲服膺拈笑殺人將謂洛浦有多少奇特到此未免被人驀面咒殺活得來幾時也頌鐵鷂高翔極盡空了無江海別相通苦哉忽地天崩倒合殺從教飛活龍瑯琊覺和尚問舉和尚近離甚處舉曰兩浙曰船來陸來曰船來曰船在甚處曰步下曰不涉程途一句作麼生道舉以座具摵一摵曰杜撰長老如麻似粟便拂袖而出瑯琊問侍者此是甚麼人曰舉上座瑯琊遂下旦過問莫是舉上座麼莫怪適來相觸忤舉便喝復問長老何時到汾陽曰某時到舉曰我在浙江早聞汝名元來見解秪如此何得名播寰宇瑯琊遂作禮曰慧覺罪過拈拳來去此是衲僧家本分鉗鎚若將破提籃盛水救火非惟不能息其燄笑殺傍觀者三十年後有人說破頌黑霧紛紛潑面來手持玉笏歎悠哉電光影裏穿針眼線重重挑不開僧叅法眼文益和尚立次師指簾時有僧同去捲師曰一得一失頌牛角撐撐虎角垂十分顏色著春枝可憐拽角攀枝者闔地一交雙𩯭泥南岳芭蕉庵谷泉禪師與慈明遇一毒龍湫捉明衣同浴明掣肘徑去師解衣跳入霹靂隨至腥風吹雨明蹲草中須晴霽師引頸出波間曰㘞拈谷泉作風作顛毒龍不敢動其一毫毛慈明老老大大猶有這個在頌谷泉忒殺作風顛一撥龍湫浪括天雷雨至今如不息慈明抱死草中眠普化和尚或城市或塚間振一鐸曰明頭來明頭打暗頭來暗頭打四方八面來旋風打虛空來連架打一日臨濟令僧捉住曰總不恁麼來時如何師拓開曰來日大悲院裏有齋拈普化和尚恁般作怪被臨濟鼻孔一捏酸去十分若無大悲院躲得過何處見有普化頌大悲院裏有齋喫普化親曾赴此回茶熟飯香人正餓放開窮漢肚皮來高峰大師隨侍雪巖欽和尚赴天寧中間因被詰問日間浩浩時作得主麼答云作得主又問睡夢中作得主麼答云作得主又問正睡著時無夢無想無見無聞主在甚麼處到這裏直得無言可對無理可伸和尚卻囑云從今日去也不要你學佛學法也不要你窮古窮今但只饑來喫飯困來打眠覺來却抖擻精神我遮一覺主人公畢竟在甚處安身立命雖信得極遵守此語奈資質遲鈍轉見難明遂有龍之行即自誓云一生做個癡獃漢定要見遮一著子明白經及五載一日寓庵宿睡覺正疑此事忽同宿道友推枕子墮地作聲驀然打破疑團如在網羅中跳出追憶日前所疑佛祖誵訛公案古今差別因緣恰如泗州見大聖遠客還故鄉元來只是舊時人不改舊時行履處自此安邦定國天下太平一念無為十方坐斷拈賊不打貧兒家高峰到此趕得主人公飛走通身冷汗不知遺下甚麼地方向枕子邊打破家私至今主人公影也不見一頌一捺捺倒扒不起渾身沒在爛泥裏驀然枕子笑呵呵咄喫瓔珞粥的不是你巖頭奯禪師值沙汰於湖邊作渡子兩岸各挂一板有人過渡打板一下師曰阿誰或曰要過那邊去師乃舞棹迎之一日因一婆抱一孩兒來乃曰呈橈舞棹即不問且道婆手中兒甚處得來師便打婆曰婆生七子六箇不遇知音秪這一箇也不消得便拋向水中拈這婆子雙髻若是巖頭和這婆子送向水中令他母子聚頭無離骨肉頌不消這個意如何賣弄家私臭老婆惡浪千層捲殘月萬山愁斷白雲多百丈卷席拈百丈出捲席冤有家債有主不必論量野鴨子向何處安頓頌沒意味的老古錐惡聲早已播今時卷却席漫狐疑不是箇中人不知玄沙和尚道鐘中無鼓響鼓中無鐘聲鐘鼓不交叅句句無前後頌打破鼓撞破鐘玄沙佛法信難通江山如畫杳然立流水一條道不同大事未明如喪考妣大事已明如喪考妣頌孰言春色無高下藍者是藍青者青試問禪流高著眼莫將犬吠作驢鳴南泉斬猫拈南泉斬猫兒拋磚引玉誰知兩堂都是個飯袋子可惜許頌刀下猫兒何俊哉腥風千古動人哀這些面目儼然在我亦幾番呼喚回趙州自外歸師舉前話示之州乃脫草鞋安頭上而出師曰子若在即救得猫兒也拈咄是何言歟頂草鞋出去大似西施戴箬㡌頌趙州婁陡狗酒酉無端頂却草鞋走直饒三搭不回頭未免早落他人手昔有婆子供養一庵主經二十年常令一二八女子送飯給侍一日令女子抱定曰正恁麼時如何主曰枯木倚寒巖三冬無煖氣女子舉似婆婆曰我二十年秪供養得箇俗漢遂遣出燒卻庵拈冷地看來這婆子也不唧𠺕何待遣出這僧方燒却且道雙髻意落在甚麼處具眼者辨看復拈古人云無奈船何打破戽斗愚謂古人之言針對針不差一些些深得婆子燒庵之旨可謂一個鼻孔出氣今有杜撰長老云無奈船何打破戽斗此乃黃金增色耳吾不知此人作何見解便容易放出熏人非惟不識燒菴打破戽斗之意兼之文理不通見地不亮臨命終時寧不道個歷歷分明悲哉真杜撰長老也且婆子二十年供養得個俗漢這僧有枯木倚寒巖三冬無煖氣之語婆子徵其道眼不明謂之俗漢豈黃金增色為然哉若婆子將二十年茶飯供養一狗子抱定曰正恁麼時如何狗子搖頭顛尾却較些子頌正恁麼時會也麼漫勞更問我如何比來一樣娘生肉徹底風流不較多頌茅堂俗漢一堆燒冷地烘烘好插蕉千古誵訛都坐斷春風送雨夾花飄有僧問報國照禪師祖佛塔廟為甚麼却被雷霹師曰通天作用為甚麼却霹佛祖曰作用處何處見有佛曰爭奈狼籍何曰見甚麼拈不霹祖佛更教伊霹阿那個聻頌驀地青天霹靂來葛藤粉碎塔門開家私未許庸人薦佛塔沉沉空劫灰舍利弗默然天女不肯維摩默然諸大菩薩讚嘆頌生意各別共街走養家一般破苕帚籮空籃空愁殺人茆店板橋啼鷄狗妙喜竹篦子話頌好笑徑山竹篦脫苕帚柄相似刺著罔明鼻孔女子從定而起韓文公叅大顛拈大顛和尚賊過後張弓活埋他俗人雖然如是秪救得一半頌夜深賊被狗子咬墻洞慌忙補得好補不好長安幾箇知天曉魯祖尋常見僧來便面壁南泉聞曰我尋常向師僧道向佛未出世時會取尚不得一箇半箇他甚麼驢年去拈魯祖面壁若作佛法商量入地獄如箭射頌從來個事只尋常好肉何須𭃰作瘡久坐自然腰折了清茶一盞濕枯腸風動幡動六祖曰仁者心動拈六祖在黃梅得些子氣息向這裏便亂撒也只是箇賣柴翁頌風動幡動元無過不動風幡更甚麼堪笑新州盧行者生枝節外便誵訛楊岐乍住屋壁疎滿牀盡撒雪珍珠縮却項暗嗟噓返憶古人樹下居頌枯柳殘暘雪片輕草堂墜落兩三楹板門久不關風月趙老胡蘆挂不成莫將尚書謁南堂靜禪師咨决心要堂使其向好處提撕適如側俄聞穢氣急以手掩鼻有省即偈曰從來姿韻愛風流幾笑時人向外求萬別千差無覓處得來原在鼻大頭南堂答曰一法纔通法法周縱橫妙用更何求青蛇出匣魔軍伏碧眼胡僧笑點頭拈莫尚書向鼻尖頭摸得些臭氣便揚出熏人南堂老漢好與三十棒何故養子不教父之過頌摸得黃金特地愁支離縱好漫風流當時若作今時用截斷尚書臭鼻頭梁山遠禪師上堂舉僧問楊岐如何是佛岐曰三驢子弄蹄行曰莫這是麼岐曰湖南長老拈要會三驢子落處須向驢胎馬腹裏走一遍來見楊岐也不難不然饒你扯得葛藤萬丈長出不得楊岐佛在三分天下有其二以服事殷周之德其可謂至德也已矣頌東風花暖色依依在處墻頭蝴蝶飛竈婦不聞天子勅太平晝夜不關扉靈雲見桃花豁然大悟偈曰三十年來尋劒客幾回葉落又抽枝自從一見桃花後直至如今更不疑拈靈雲行三十年不知踏破幾許草鞋若無桃花刺破眼睛更走三十年未是苦在頌遍界桃花歷亂開遊蜂香醉落紅腮如何獨許靈雲見咄咄時人快道來磨穿鞋底路悽悽一見桃花雙泥無限風流只這是𣗳頭賺殺杜鵑啼僧問馬祖離四句絕百非請師直指西來意祖曰我今日勞倦不能為汝說得問取智藏其僧乃來問師師曰汝何不問和尚僧曰和尚令某甲來問上座師曰我今日頭痛不能為汝說得問取海兄去僧又去問海百丈和尚海曰我到這裏却不會僧乃舉似馬祖祖曰藏頭白海頭黑拈這僧非惟眼瞎亦復耳聾頌簷前風過白雲斜幾度笙歌意轉賖犬吠夜深途路客為貪花柳未歸家花塢春風滿袖香紅紅白白兩相當那堪更有多情者麥笛一聲過野塘興化獎禪師謂克賔維那曰汝不久為唱導之師賔曰不入這保社師曰會了不入不會了不入曰總不與麼師便打曰克賔維那法戰不勝罸錢五貫設饡飯一堂次日師自白椎曰克賔維那法戰不勝不得喫飯即便出院拈賊是小人智過君子興化跟被克賔掀起半空過一小劫方得著地克賔古佛其心安如海會麼賣盡衣單終不赤膊好則好矣美則盡美生鐵橛子只不得喫飯頌昨日喫飯今日饑得便宜處失便宜爛泥上壁不得力劈面西風打活籬德山托鉢拈密啟其意壁上貼門神低頭歸方丈慚惶殺人果與尋常不同毫𨤲有差天地懸隔也秪得三年活我為法王於法自在豈受人塗污咄咄頌出門不利情不賖相逢都是生冤家歸去罷較些些亂啼春鳥落藤花丹霞慧林寺遇天大寒取木佛燒火向院主訶曰何得燒我木佛師以杖子撥灰曰吾燒取舍利主曰木佛何有舍利師曰既無舍利更取兩尊燒主自後眉鬚墮落拈院主便恁麼道因甚眉鬚墮落具眼者試說看頌中堂虎坐面門穿彗孛星飛入子年掩室春風家裏過不知花落草芊芊一喝分賔主照用一時行拈臨濟和尚提唱空王佛向上一著可謂搆村迭店暗裏書符忽遇無舌人他喝不得又作麼生賔主俱隱照用俱瞎佛法無靈驗頌桃李花開三月天滿園青白潑人寒枝頭春倦吹微細砌地殘紅不耐看一句中具三玄一玄中具三要拈人人盡道臨濟和尚是個白拈賊到這裏話不虛傳咄其言不當頌春曉黃鶯呌翠微遊人陌上踏歌歸紙錢縷縷堆寒食遍野青氊古墓暉佛照燒木佛有舍利天然燒木佛無舍利拈我也道頌丹霞佛照一坑埋誰向爐邊拾死柴千古路亭寒索索逼人舍利滿青鞋有秀才看千佛名經問曰百千諸佛但見其名未審居何國土還化物也無師曰黃鶴樓崔灝題後秀才還曾題也未曰未曾師曰得閒題取一篇好拈可惜一座黃鶴樓被長沙和尚埋沒殺千佛名經裏許喚作註解得麼癡人面前勿得說夢頌塞鴈一聲喉舌冷悽悽蘆笛月明中荒塘踪跡無漁火徒有秋烟拂暗風僧問洞山初和尚牛頭未見四祖時如何山云楖𣗖木拄杖見後如何山云竇八布衫拈洞山和尚大似不唧將別家拄杖布衫作自己物與他人若是個皮下有血的衲僧拄杖布衫一時安置竇八郎赤條條過日豈不悲哉頌竇八布衫不禦寒七穿八穴破闌殘自從一見祖師後燈盞茶瓶盡入官僧問初和尚如何是諸佛出身處山云寒山不語拾得笑拈屈哉苦哉這兩個風顛漢自由自在自喜自悲與他諸佛影無交涉扯來填溝塞壑有屈無呌處頌寒山不語拾得笑覿面與君說破了花落苔深春雨時曹兵敗走華容道僧問如何是佛山云麻三斤拈洞山定盤星也不識向秤鎚上辨斤兩頌如何是佛麻三斤搓得一條釣桶繩枯草井邊風雨爛年深日久變成精趙州問一婆子甚麼處去婆云偷趙州筍去師曰忽遇趙州又作麼生婆便與一掌師休去拈夜眠侵曉起更有不眠人婆子一掌趙州猶如啞子喫黃𤓰雖然這婆子也是看孔著楔未是好手頌趙州慣使上頭關活脫齒牙若劒山今日偶逢花面虎雖無傷命血潺潺這一掌那一掌竹林深處倦將還相逢狹路難回避唱個山歌也當閒黃檗運禪師因有六人新到五人作禮中一人提起坐具打一圓相師曰我聞有一隻獵犬甚惡僧云尋羊聲來師曰羊無聲到汝尋僧云尋羊跡來師曰羊無跡到汝尋僧云尋羊蹤來師曰羊無蹤到汝尋僧云與麼則死羊也師便休去明日陞堂曰昨尋羊僧出來僧便出師曰昨日公案未了老僧休去你作麼生僧無語師曰將謂是本色衲僧元來是義學沙門便打趂出拈黃檗幸是作家何不當時便打趂出須待明日且道黃檗意作麼生這僧既會尋羊蹤跡來又不會黃檗休去非惟義學沙門還是脫空奴子頌要覓羊蹤跡無村農钁罷晚來沽滿林寒鵲爭枝聚風送餘音不當烏仰山隨溈山游山到盤陀石上坐師侍立次忽鵶銜一紅柿落在面前溈拾與師師接得洗了度與溈溈曰子甚處得來師曰此是和尚道德所感溈曰汝也不得無分即分半與師拈你看溈山父子譚禪盡是平實語言著著不離紅柿一枚何似大地眾生性命不出溈山父子舌尖上吞吐鵶子供養序品第一可謂佛法人情事事皆到頌溈山倦坐興偏賒飛箇鵶兒也作家何處啣來紅柿子溈山父子當盃茶仰山一日有梵僧從空而至師曰近離甚處僧云西天師曰幾時離彼僧云今早師曰何太遲生僧云遊山玩水師曰神通遊戲即不無佛法須還老僧始得僧云特來東土禮文殊却遇小釋迦遂出梵書貝多葉與師作禮乘空而去自此號小釋迦拈這胡僧不識是誰家之子徃返得恁麼快便仰山小釋迦梵僧口邊得名一時佛法隆盛若依語風斷小釋迦不合受伊梵書貝多葉既受應當與梵僧三十拄杖何故世無不答之禮文殊哂之頌飛來一錫禮文殊遊戲雲烟作便輿風細細雨疎疎仰山古佛一茅廬道人錯落天中月不合𭣣他一梵書瑞州九峰道虔禪師福州人也嘗為石霜侍者洎霜歸寂眾請首座繼住持師白眾曰須明得先師意始可首座曰先師有甚麼意師曰先師道休去歇去冷湫湫地去一念萬年去寒灰枯木去古廟香爐去一條白練去其餘即不問如何是一條白練去首座曰這箇秪是明一色邊事師曰元來未會先師意在首座曰你不肯我那但裝香來香烟斷處若去不得即不會先師意遂裝香香烟未斷座已脫去師拊其背曰坐脫立亡即不無先師意未夢見在拈若論九峰逼殺泰首座理合喫二十棒首座未會先師意惑亂大眾三十拄杖一杖較不得泰首座脫去如此迅速果然難得無奈達磨大師先曾說破不論禪定解脫惟論見性成佛今泰首座錯解石霜之語單修枯定一色邊作活計若當時九峰拊背迸出活眼曰先師意聻管教九峰滿面慚惶容身無地如紙衣道者見曹山山云莫是紙衣道者麼者諾山曰如何是紙衣下事者曰一裘纔挂體萬事悉皆如山曰如何是紙衣下用者進前三步脫去山曰秪解恁麼去不解恁麼來者即開眼問曰一靈真性不假包胎時如何山曰未是妙者曰如何是妙山曰不借借者脫去這箇纔是語風今日與首座代一語九峰若問如何是一條白練去便與劈脊一棒頌白練千尋孰可攀影無顏色似人間苦哉錯會先師意脫去妨他路轉頑九峰老語忒辣祖氣岸從來惡把住須彌不放行更添下千斤索僧問大梅如何是祖師西來意大梅曰西來無意鹽官聞乃曰一箇棺材兩箇死漢拈大梅猶自可鹽官苦殺人三箇也有頌答處虛虛江上風一枝搖落荻花叢漁舠輕放瀟湘月那得魚龍入網中故使傍觀發一笑雙雙驚起宿沙鴻雲門匡真禪師到江州有陳尚書請齋纔見便問儒書即不問三乘十二分教自有座主作麼生是衲僧行事師曰曾問幾人來書曰即今問上座師曰即今且置作麼生是教意書曰黃卷赤軸師曰這箇是文字語言作麼生是教意書曰口欲譚而辭喪意欲緣而慮忘師曰口欲譚而辭喪為對有言意欲緣而慮忘為對忘想作麼生是教意尚書無語師曰見說尚書看法華經是否書曰是師曰經中道一切治生產業皆與實相不相違背且道非非想天有幾人退位書無語師曰尚書且莫草草三經五論師僧拋却特入叢林十年二十年尚不奈何尚書又爭得會書禮拜曰某甲罪過拈這俗漢草賊大敗不知觸忤多少阿師來今日赤眼撞著火柴頭拶得上天無路入地無謀渾身放倒方知禪和子利害古今白衣說法頗多難問者不少陳尚書可謂法門榜樣頌紙糊面孔黑漆心撞著銅頭鐵眼禽活捉生擒死去也放渠殘命度荒林雲門老千古萬古何處討鋒鋩雷電秋空曉霹碎巖前爛草窠這回狂浪殘聲杳分付妻孥莫亂道江湖自有肝膽人捏死狐狼血牙爪僧問趙州和尚狗子還有佛性也無州云無頌趙州狗子無佛性太上老君急急令張三燒却兩莖眉燋爛古墳丞相病藥山令供養主抄化甘贄行者問甚處來曰藥山來甘曰來作麼曰教化甘曰將得藥來麼曰行者有甚麼病甘便捨銀兩錠意山中有人此物却回無人即休主便歸納疏藥山問曰子歸何速主曰問佛法相當得銀兩錠山令舉其語主舉已山曰速送還他子著賊了也主便送還甘曰由來有人遂添銀施之拈古人道一句合頭語千載繫驢橛行者到這裏被化主一合合倒轉身不得兩錠金填溝塞壑化主却在困頭上捧金便走若無藥山相救至今尚在困夢中頌石中有水水中火燒殺禪人一張嘴忙至堂前舉向渠累他辛苦多來去秦時𨍏鑠鑽頌秦時鍍鑠鑽隔墻野鬼喚芻狗吠茅叢但聽取一半音釋筑之六切音竹以竹曲為五絃之樂也贔平秘切音備巨鼇贔屓首冠靈山力壯貌磉寫曩切音顙柱下石蹲徂尊切音存踞也顋桑才切音鰓頰顋郎丁切音靈與羚同羚羊似羊而大角有圓繞蹙文夜則懸角木上以防患
