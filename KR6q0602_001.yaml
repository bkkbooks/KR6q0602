body:
  text: 參學門人弘歇等編住東塔禪寺語録師於崇禎癸未夏荊溪受嘉禾東塔請至仲秋八月初八日進院十五日曹石倉談掃菴朱葵石汪爾陶談誾仲高寓公沈甫受朱子藻子葆子容李珂雪孫培菴吳水原孫起伯朱範臣欽臣迪臣王季延嚴𨍏轢同合山大衆暨諸護法士紳等請就本寺開堂師升座云東塔寺前問水神相逢盡作帝鄉人故園田地如何會一喝分明介主賔拈香云此一瓣香根盤靈鷲價重坤維卷之則千巖截流放之則六合彌豐爇向寶爐端為今上皇帝聖躬萬安惟祈邊邦寧謐海不揚波士農工商咸沾化育此香供養華嚴會上清涼澄國師復指香云此香供養禹門幻有先師大和尚用酬法乳斂衣就座白椎竟舉仰山問中邑洪恩禪師云如何得見佛性義恩云我與汝説個譬喻如一室有六內有一獼猴外有獼猴從東邊喚猩猩猩即應如是六俱喚六俱應仰山禮謝起云適蒙和尚譬喻無不了知秪如內獼猴睡著外獼猴欲與相見又且如何恩下繩床執仰山手作舞云猩猩與汝相見了譬如蟭螟蟲在蚊子眼睫上作窠向十字街頭呌云土曠人稀相逢者少師云若無仰山後語幾乎獼猴個個無尾巴諸人要見佛性義麼漁船上有榼𣜂堆頭有下座八月草九日談掃菴誕日設齋請上堂師云佛身充滿於法界到不得者裏普現一切群生前太勞勞生隨緣赴感靡不周還見麼而恆處此菩提座掀翻他窠臼有明眼者出來簡點看僧問如何是向上一乘師云塔尖峰頂如何是向下事師云幡竿動也意旨如何師云地藏菩薩問擊碎東塔踏翻太湖且道此人具甚麼手眼師舉如意示之進云拋却德山棒放下臨濟喝還有為人處也無師云到得這裏麼序東徐居士薦母請上堂古人道父母非我親誰是最親者諸佛非我道誰是最道者父母既非我親畢竟誰是至親有伶俐衲僧出來道看一僧才出師珍重下座結制上堂師云結制無有他為切念生死大事到此禪堂不得東語西話不得亂想胡思一心正念提起話頭看個父母未生前那個是我本來面目若不苦心參究受他施主供養滴水難消切須仔細甲申元旦諸護法暨大衆請祝聖上堂師升座拈香畢乃云且道新年頭佛法如何舉揚村村蠶麥熟處處稻花香忽聞爆竹聲隨云爆竹一聲天地老塔前無處不光輝即此是法即此是道大衆久立珍重恆輝禪人供衆請上堂古者道平常心是道喜怒罵詈咳唾掉臂無非是祖師西來大意此事不論初機晚學只要一個信得及若是夙有靈根猛自提撕忽然正眼豁開方見老人眉毛端的臘八日談掃菴居士為薦誥封夫人徐氏請上堂師升座維那白椎竟師喝一喝什麼第一義第二義今日掃菴居士為亡過誥封夫人徐氏曾於病中發心請老人説法普利一切夫説法者聽法者如夢如幻無有是處而徐氏夫人仗此勝因超生天界作天眷屬不墮人間受諸苦惱平坦坦地佛祖安身立命之處喝一喝云者裏是甚麼所在容伊著腳經云諸佛智慧甚深無量其智慧門難解難入復喝一喝云什麼智慧門只消一個乾屎橛擊碎流出一切麻三斤庭前柏樹子三玄三要五位君臣有句無句打作一串不消老人一拂化為微塵久立珍重解制陸登之居士請上堂師升座云結制解制為個甚麼秪為當人腳跟下一假大事不明如大火聚不得清涼所以道十方同聚會個個學無為此是選佛場心空及第歸一期過了堂中不見一箇半箇雖然且喜太平良久云一二三四五六七萬仞峰頭獨足立問伊你更是阿誰我是人間白拈賊遂喝一喝云十字街頭撞著馬相公與你索飯錢你作麼生秪對衆無語師云老人與你代一轉語春風日日到園林夜夜面南看北斗到雲門顯聖請上堂喝一喝云法王法座如此如彼三宜上座同季超祁居士請老人登此猊座不免乘時拈出普告大衆老僧昔拈靈樹不無其繇蓋主法者不嚴聊借此以見志况先年三登禹門機緣歷歷可考此乃沿流不止嫡親嫡故無敢違者若也竟拈靈樹則辜負禹門若也竟拈禹門則辜負靈樹今日人天衆前掇轉船頭順風把舵去也遂拈香云即此供養直𨽾常州府宜興縣荊溪禹門幻有先師大和尚從此不敢辜負就座乃云去聖時遙宗門紊亂必須洞達心宗庶不虛生浪死若也不悟自心終日尋行數墨了沒交涉於今目前依草附木者豈達磨一宗乃糟粕耳假我衣裳名是比丘豈千聖不傳之旨如此容易者哉佛法不直半文矣諸仁者趂色力強健時討箇分曉莫待眼光落地業識茫茫平日説禪説道竪指伸拳到恁麼時你還作得主去麼喝一喝云啼得血流無用處不如緘口度殘年下座崇禎十六年四月草六日師至龍池掃塔荊溪吳九敘居士暨禹門大衆等請上堂師至座前喝一喝遂升熏風自南來殿閣生微涼倦來困一覺何必好眠牀此一瓣香專為當今聖君皇帝惟願道心永鋭太平天下令十方法界衆生各各安樂自在次拈云此香供養本山前代一源禪師復拈云此一瓣香供養即此禹門堂上嗣臨濟正宗幻有先師大和尚用酬法乳之恩斂衣就座白椎云法筵龍象衆當觀第一義師乃云佛法正是衰替時節各宜努力以求出世人人埋沒多生今朝若不透徹何時解脫不見南嶽讓參六祖云甚麼物恁麼來讓不會經八載便對六祖道説似一物即不中祖云還假修證也無讓云修證則不無污染即不得祖云只此不污染諸佛之所護念汝既如是吾亦如是善自護持者箇一物即不中便是六祖大師本來無一物合轍之語所以祖祖相傳佛佛授受與達磨大師正法眼藏合文合節若有半字差異即同魔外何為臨濟正宗也白椎云諦觀法王法法王法如是師卓拄杖下座天童景德禪寺諸護法同合山大衆請上堂師升座呵呵大笑且道笑箇甚麼笑那無舌人善能解語喝一喝云不必重打葛藤須向未舉以前會取若論此事盡大地拈來在老人一毛孔中著不滿諸佛心印不從人得既不從人得難道從墻壁瓦礫得既不從墻壁瓦礫得難道從地水火風四大五蘊喜怒哀樂而得豁開自己正眼照天照地始知不從人得如啞子喫苦瓜向人道不得遂鼓兩臂作獅子奮迅勢云獅子遊行不求伴侶喝一喝下座上堂喝一喝云斬開碧落百花新扶起山門兩位人古殿雖殘雲不老燈傳白月夜精神四明鄞邑乃老朽故土為送天童和尚入塔蒙城中士紳留住數日此乃鄉情眷眷陸敬翁長者相招同到天王古剎并遊勝地此寺創自晉代至宋元重修雖然山門殘替門前光景如舊自有人天安排諸仁者要識自家本命元辰著落不必他求逆順境緣消歸自己人命無常不與人期一氣不來便同土塊今日老人談話原非別事如來出世為衆生沉溺生死苦口叮嚀撥動上頭關棙欲令衆生得入此門又勞他達磨大師到我震旦傳佛心印直指人心見性成佛之旨今幸長者請登此座重為舉揚俾益四衆知腳跟下有此一假光明諸仁者急須諦審休將間學解埋沒祖師心珍重乙酉改元三月十七過雲間超果寺監院知一靜主紹源并各山大衆暨合郡檀護請祝聖上堂師升座拈香云此香非陰陽造化之所成亦非金木水火土之所生爇向爐中端為祝延今上皇帝聖躬萬歲萬歲萬萬歲伏願堯風永扇於大明舜德普聞於沙界闔朝文武公卿尊崇祿位遠近檀那均斯法化遂斂衣就座僧問如何是衲僧本分事師便打進云除却棒請師再道一句師復打僧禮拜起便喝師連打問雲門普趙州關即不問秪如乾坤未立世界未形時主人公向何處安身立命師云念言語漢云恁麼則鶴棲無影樹花發不萌枝去也師云芽生也乃云暮春三月好風光盡見遊心白面郎國界無虞今日定夜深皓月照長廊竪拂子云即此用離此用復震威一喝云此是馬祖陳爛葛藤不勞拈出今日打些新鮮葛藤與大衆結緣會麼若論者事三世諸佛無下口處歷代祖師結舌有分何故法如是故祖師出世蓋為一切衆生沉淪苦海墮落五欲所以開方便門接引愚癡咄言多去道遠矣還有問話者麼僧問如何是大師方便門師以拂子畫一畫云會麼太平日月光天德一統山河壯帝居久立珍重上堂七十五年何處來燈籠生腳上天台癡人知道我來處三月菜花歷路開老人于甲申八月被業風吹入雲間承衆居士供養數月監院一輪同衆檀恭請金澤頤浩禪寺説些間話且舉現成公案與大衆商量乃云昔日圓悟禪師參五祖演和尚聞舉小豔詩云頻呼小玉原無事只要檀郎認得聲乃出方丈見雞飛上欄杆鼓翅而鳴豁然大悟作偈云寶鴨香消錦繡幃笙歌藂裏醉扶歸少年一假風流事只許佳人獨自知為甚麼只許獨自知聻老人今日為他下箇注腳雞寒上樹鴨寒下水雖然如是逗漏不少復舉臨濟和尚道有一人論劫在途中不離家舍有一人離家舍不在途中此二人那箇合受人天供養顧侍者云喚這二人來與老僧洗腳此事人人腳跟下乾乾淨淨無有𮈔毫泥水只為耽著五欲從迷入迷喚作衆生所以雜華偈云毗盧遮那佛願力周沙界一切國土中恆轉無上輪今日盧舍那佛在徑山拂子頭上轉大法輪去也遂擊拂子召大衆云還聞麼竪云還見麼且道聞底事作麼生衆無語代云如是我聞便下座弟子教欣教守教果等請上堂乘言者喪滯句者迷古人已道破了也何故要你向自性三昧海中狂波濶浪裏轉身吐氣始有説話分雖然更須向深雲窮谷養得純純熟熟方可出來人天衆前舉揚箇事光耀祖庭瞻之仰之庶不辜負達磨大師西來一番辛苦若也不然只是箇蝦蟆田雞亂跳亂呌成得箇甚麼邊事乃大笑復云笑那吳山端獅子見弄獅子得悟後有老僧譏他道鄉裏獅子鄉裏弄眼睛鼻頭一齊動假饒弄到帝王前也是一場乾打閧有時上堂云佛法無可得説不如打箇斤斗便下座今日徑山在頤浩上堂也無獅子弄也不打斤斗説些平實話接物利生且道如何是接物利生句聻參須實參悟須實悟有僧出禮拜擬問師便打僧云某甲話也未問師云待你開口成得箇甚麼便下座上堂今日登此寶座為本鎮居士持資供衆請老人説些佛法普利群生諸仁者莫瞌睡惺惺著眼前山林池沼無非是你故宅只為離鄉太久所以不得受用良久云樂云樂云鐘鼓云乎哉禮云禮云玉帛云乎哉即此見聞非見聞無餘聲色可呈君箇中若了原無事體用何妨分不分卓拄杖云離中虛坎中滿住越州雲門寺語録上堂雲門有一奇特事從曠大劫來無人動著今日分明舉似大衆良久云忘却了也曳拄杖下座荊門上座出關請上堂春秋三度掩柴關無事於心不放間今日聊通一線道踏開煙水入深山既是出關合該逍遙山水於石橋啜茗焚香於溪闍為什麼又要入山聻為他途路不得力結制上堂欲知佛性義當觀時節因緣時節若至其理自彰大衆今日是甚麼時節舉拂子一拂云雲門老古錐出世也地搖六震天雨四花且道有何祥瑞五雲山下青獅子曳尾搖頭弄爪牙遂喝云這畜生休作怪要騎便騎要下便下師誕日解制上堂老人自住雲門已來不曾動著一步不曾措著一辭今日幸遇解制打開長汀子布袋放出百千萬億光明雲將五湖四海衲子而為眷屬使歷劫多生父母俱超樂國以拂子打云會麼盡十方世界是燃燈古佛光明門盡十方世界是釋迦老子總持門盡十方世界是兜率陀天彌勒世尊解脫門盡十方世界是文殊師利法王子般若波羅密門盡十方世界是普賢菩薩行願門盡十方世界是一切修多羅差別義海門盡十方世界是凡夫衆生四生六道微細極微細昆蟲蚤虱生滅門乃喝云今日雲門解制猶如螃蟹去草縛橫行直撞切須仔細倘遇無厭足王莫道我是雲門解制來若道著被他一棒打折你驢腰莫言不道辭請崇禎甲戌十月十一日衆集千指菴請徑山開堂師辭衆曰今日承大檀鄉紳暨唐祈遠居士起緣為首閔裴卿居士率衆拜請請語風出世非惟大檀鄉紳居士請語風出世又復諸山大衆請語風出世非惟諸山大衆請語風出世又復本山各房大衆請語風出世非惟本山各房大衆請語風出世又復開山國一大覺祖師無上禪師法濟大師大慧杲妙喜老人別峰禪師塗毒禪師乃至八十七代住持大和尚請語風出世非惟開山國一大覺祖師無上禪師法濟大師大慧果妙喜老人別峰禪師塗毒禪師乃至八十七代住持大和尚請語風出世又復本山護法伽藍廣澤龍王雙髻周宣靈王靈山授記十八位伽藍請語風出世非惟本山護法伽藍廣澤龍王雙髻周宣靈王靈山授記十八位伽藍請語風出世又復主山神主地神主空神主林神主風神主海神主江神乃至鬼神等請語風出世非惟主山神主地神主空神主林神主風神主海神主江神乃至鬼神等請語風出世又復梵天帝釋天韋天乃至無想天非非想天三十三天諸天神衆請語風出世非惟梵天帝釋天韋天乃至無想天非非想天三十三天諸天神衆請語風出世又復乾屎橛麻三斤柏樹子青州布衫胡餅請語風出世請出世作甚麼庭前生瑞草好事不如無諸人豈不知徑山祖庭從唐宋至本朝宣德二百年來宗風閴寂祖道不行賴有本山各房接管香火方得殿宇廊廡煥然一新若論今日請語風出世為衆説法利濟衆生沒交涉你看那箇是衆生記得圓通訥禪師云長安風月貫今昔那箇男兒摸壁行家家觀世音有路透長安若箇今日出世求名名蓋天下久矣把手牽他行不得惟人自肯乃方親按牛頭喫草決使不得良久師舉雲門到雪峰莊見一僧乃問上座今日上山去那僧曰是門曰寄一則因緣問堂頭和尚秪是不得道是別人語僧曰得門曰上座到山中見和尚上堂衆才集便出握腕立地曰這老漢頃上鐵枷何不脫却其僧一依門教雪峰見這僧與麼道便下座攔胸把住曰速道速道僧無對峰拓開曰不是汝語僧曰是某甲語峰曰侍者將繩棒來僧曰不是某語是莊上一浙中上座教某甲來道峰曰大衆去莊上迎取五百人善知識來門次日上雪峰峰才見便曰因甚麼得到與麼地門乃低頭從此契合若論今日請語風出世即是著語風在鐵床裏使我動不得隨人使喚被人指揮如案頭豬肉斬斷由他何苦得語風三十年來不曾受人拘束但飢來喫飯困來打眠逍逍遙遙林間步武自由自在何苦得要我出世出世是大惡業事放我在地獄裏去你看那箇是為生死的甚麼喚做生死汝等不如歸去好語風決決不出世不出來謾神謔鬼有甚麼相干實無利益直饒截我語風頭去寧作無頭人亦不隨汝等腳跟轉不如歸去好大衆跪久不起師瞥然裴卿閔居士云大師雖未登座説法已竟十三日衆再請再辭前日説竟了今復何為又勞大衆來此衆云世尊三請方説法師曰世尊眼花及至道箇止止不須説早已逗漏不少有甚奇特若向衲僧門下好與三十拄杖衆再四師曰稅不重科又曰再犯不容乃舉雪峰妙湛和尚示衆一切法無差雲門胡餅趙州茶黃鶴樓中吹玉笛江城五月落梅花慙愧太原孚上座五更次鼓角天曉弄琵琶語風也有兩句一切法無差鵓鴣對老鴉生臺爭飯喫打得亂如麻有約不來過夜半間敲碁子落燈花慚愧西湖保叔塔六橋煙雨夕陽斜珍重師便轉身衆候良久散去崇禎乙亥歲三月初三日司理黃海岸居士請徑山開堂三門喝一喝云惟有一門而復狹小竪拂子指門云莫得就是這箇門那巍巍堂堂煒煒煌煌入此門者如獅子王復喝一喝二位力士證明彌勒殿喝一喝云喚你作彌勒又是布袋和尚喚你作布袋和尚又是彌勒畢竟如何一彩兩賽韋馱殿韋天韋天還記得湖州辨山多寶寺苦告你因緣麼遂禮拜云珊瑚枕上兩行淚半是思君半恨君伽藍殿廣澤龍王不忘靈山之付囑發菩薩心捨宮殿為國一祖師伽藍今當現身而去垢莫假瞌睡以蒙董竪拂子指龍王厲聲云汝當護法祖師殿會麼坐得骨臀生胝不知冷暖八十七人成群打哄大似守尸魂鬼喝一喝云開佛殿稽首瞿曇黃面老爺離言説相離文字相離心緣相畢竟平等這箇説話與我付之海外升座卓拄杖三下拈香云此一瓣香恭惟北闕之至尊上祝南山之萬壽扇堯風於千古布舜德於今時惟願邊疆平靜國界安寧斂衣就座乃云今日時逢三月三黃司理請老人為衆舉揚且道舉揚箇甚麼威音王那畔更那畔這一著復卓杖一下云大衆還會麼還有人出來問話麼勿得辜負居士一副熱腸此事人人具足箇箇圓成居士出衆問云如何是箇箇圓成的事師云好與三十棒會麼日輪西墜夜月東升卓拄杖下座司理黃海岸居士為封公壽誕請上堂師至座前作女人拜云稽首須彌山王以拂子指座云此乃八十七位所坐的曲彔木牀老僧今日不敢違時失候照例施行就中一句作麼生道還有人道得麼若無老僧自道去也遂升居士禮拜問云八十七代燈燈相續祖祖相承大師今日且道如何為人師竪拂子乃云四月今晨最吉祥托來鐵鉢古風香海岸道人知此意高遷爵祿捧霞觴門裏出身易一聞千悟有甚麼難身裏出門難坐却白雲宗不妙從天降下則貧窮如人數他寶從地湧出則富貴擊遍擊等遍擊動遍動等遍動吼遍吼等遍吼正恁麼時山門頭撞著善財童子五十三位大菩薩各各手持華幔幢幡寶蓋珊瑚瓔珞珍寶等物外有無根樹一株呌不應山谷一座無陰陽地一片老僧問伊道擔荷許多骨董到此作什麼菩薩答云相聞黃封翁八旬壽誕特來慶賀老僧云難得菩薩還來遂喝一喝云莫作一喝會聊為菩薩買草鞋竪拂子云見麼若也見𭣟瞎汝眼若也不見眼在甚處問答不録擊拂子下座大中丞余集生居士請上堂白椎畢師云若論第一義向悉達未生時會取一切衆生無明煩惱中會取四生六道驢胎馬腹中會取今日朝暘峰頂千僧閣下不行妙喜老人走過的路不飲妙喜老人喫過的水老僧別有一假家風作麼生是老僧家風江月照松風吹永夜清宵何所為佛性戒珠心地印霧露雲霞體上衣此乃永嘉大師受用的非惟永嘉受用即是老僧受用何以故道道相同祖祖相授若是己事未明心地不亮顢顢頇頇𢤱𢤱恫恫未免向驢胎馬腹中作活計去也良久云一槌擊碎珊瑚月大地山河是阿誰僧出問云如何是祖師關師云過不得云未過關如何接師云立云已過關如何接師云坐云總不恁麼時如何師擊拂子兩下云大師即今在何處安身師云蠟燭兩行排僧禮拜云恁麼則學人有賴去也師云錯問中心樹子請師舉示大衆師云再舉來僧擬議師便喝問古鏡重光即不問孤峰獨露時如何師云萬里一片雲云大風吹散時如何師云蒼天蒼天問徑山堂上敲鐘擂鼓驚起座中獅子舞如何是獅子舞師擲花瓶云花瓶倒地云請大師再道師灑香灰云蘇嚕蘇嚕師曳拄杖下座因事上堂咄咄咄徑山乃唐宋已來之徑山擊拂子云八十七人在此經過非今日之徑山非一日之徑山也千年常住一朝僧今朝祖令當行十方坐斷且道還有祥瑞也無鐘樓生耳朵佛殿又懷胎海岸居士出問云如何是鐘樓生耳朵師拈生香云會取這箇進云如何是佛殿又懷胎師云産下也士禮拜云須是大師説法始得師乃云今承吳江大檀同諸護法等命老人登獅子座理荒殘之祖席扶陳爛之頺綱這喚做狗尾續貂那管家家門前火把子釣漁船上謝三郎即不問媳婦騎驢阿家牽道將一句來還有人道得麼良久云一拂擊開金殿月萬家無箇不光明復舉溈山云有句無句如藤倚樹踈山持此語問溈山值溈泥壁次踈云有句無句如藤倚樹是和尚語不溈云是踈云忽然樹倒藤枯句歸何處溈放下泥盤呵呵大笑歸方丈踈云某三千里外賣布單來和尚何得相弄溈喚侍者取三百文錢與這僧買草鞋去後來有獨眼龍為你點破在踈至明招處舉前話招云更使溈山笑轉新踈山有省原來溈山笑裏有刀師復召大衆曰要見溈山笑裏刀麼呵呵大笑下座海岸居士請上堂師竪拂子云也大奇也大奇無情説法不思議彈指頃石虎咬殺青田雞燈籠露柱忍俊不禁𨁝跳上鵬摶峰頂揚聲大吼且道吼箇甚麼功德池中添箇月滿林光彩可追隨舉臨濟和尚云有一人論劫在途中不離家舍有一人離家舍不在途中那箇合受人天供養師云這箇語話大似掩耳偷鈴瞞人自瞞諸人要識這兩箇人麼餘杭紙貴一狀領過音釋榼𣜂上克盍切音𨍰酒器也下私盍切三入聲枯𣜂也聻乃里切音你如禪未見也𭣟救角切音連刺也鵬蒲登切音朋大鵬鳥也
